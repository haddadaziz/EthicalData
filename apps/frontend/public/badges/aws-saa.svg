<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <defs>
    <linearGradient id="awsSaaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Hexagon Badge Body -->
  <polygon points="100,5 190,55 190,175 100,225 10,175 10,55" fill="url(#awsSaaGrad)" stroke="#60a5fa" stroke-width="4" filter="url(#shadow)" />
  <!-- Inner Border Line -->
  <polygon points="100,14 181,59 181,171 100,216 19,171 19,59" fill="none" stroke="#93c5fd" stroke-width="1.5" opacity="0.6"/>
  <!-- Header Text: AWS Certified -->
  <text x="100" y="42" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="16" text-anchor="middle" letter-spacing="1">aws</text>
  <text x="100" y="58" fill="#e0f2fe" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="11" text-anchor="middle" letter-spacing="1.5">CERTIFIED</text>
  <line x1="45" y1="68" x2="155" y2="68" stroke="#93c5fd" stroke-width="1" opacity="0.5"/>
  <!-- Main Title: Solutions Architect -->
  <text x="100" y="105" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="17" text-anchor="middle">Solutions</text>
  <text x="100" y="128" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="17" text-anchor="middle">Architect</text>
  <line x1="45" y1="145" x2="155" y2="145" stroke="#93c5fd" stroke-width="1" opacity="0.5"/>
  <!-- Footer Level: ASSOCIATE -->
  <text x="100" y="175" fill="#60a5fa" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="12" text-anchor="middle" letter-spacing="3">ASSOCIATE</text>
</svg>
