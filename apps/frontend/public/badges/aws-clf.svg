<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <defs>
    <linearGradient id="awsClfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>
    <filter id="shadowClf" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Hexagon Badge Body -->
  <polygon points="100,5 190,55 190,175 100,225 10,175 10,55" fill="url(#awsClfGrad)" stroke="#fde047" stroke-width="4" filter="url(#shadowClf)" />
  <!-- Inner Border Line -->
  <polygon points="100,14 181,59 181,171 100,216 19,171 19,59" fill="none" stroke="#fef08a" stroke-width="1.5" opacity="0.6"/>
  <!-- Header Text: AWS Certified -->
  <text x="100" y="42" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="16" text-anchor="middle" letter-spacing="1">aws</text>
  <text x="100" y="58" fill="#fef3c7" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="11" text-anchor="middle" letter-spacing="1.5">CERTIFIED</text>
  <line x1="45" y1="68" x2="155" y2="68" stroke="#fef08a" stroke-width="1" opacity="0.5"/>
  <!-- Main Title: Cloud Practitioner -->
  <text x="100" y="105" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="17" text-anchor="middle">Cloud</text>
  <text x="100" y="128" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="16" text-anchor="middle">Practitioner</text>
  <line x1="45" y1="145" x2="155" y2="145" stroke="#fef08a" stroke-width="1" opacity="0.5"/>
  <!-- Footer Level: FOUNDATIONAL -->
  <text x="100" y="175" fill="#fef08a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="11" text-anchor="middle" letter-spacing="2.5">FOUNDATIONAL</text>
</svg>
