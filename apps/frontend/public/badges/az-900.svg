      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="50%" stop-color="#0369a1" />
      <stop offset="100%" stop-color="#075985" />
    </linearGradient>
    <filter id="shadowAz" x="-10%" y="-10%" width="120%" height="120%">
