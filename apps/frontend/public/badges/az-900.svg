  <text x="100" y="75" fill="#e0f2fe" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="11" text-anchor="middle" letter-spacing="1.5">MICROSOFT CERTIFIED</text>
  <line x1="45" y1="83" x2="155" y2="83" stroke="#7dd3fc" stroke-width="1" opacity="0.5"/>
