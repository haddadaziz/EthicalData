  <!-- Shield Badge Body -->
  <path d="M100 5 L185 30 L185 130 C185 180 140 215 100 225 C60 215 15 180 15 130 L15 30 Z" fill="url(#azGrad)" stroke="#38bdf8" stroke-width="4" filter="url(#shadowAz)" />
