<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <defs>
    <linearGradient id="comptiaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="50%" stop-color="#b91c1c" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
    <filter id="shadowComptia" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Hexagon Badge Body -->
  <polygon points="100,5 190,55 190,175 100,225 10,175 10,55" fill="url(#comptiaGrad)" stroke="#f87171" stroke-width="4" filter="url(#shadowComptia)" />
  <!-- Inner Border Line -->
  <polygon points="100,14 181,59 181,171 100,216 19,171 19,59" fill="none" stroke="#fca5a5" stroke-width="1.5" opacity="0.6"/>
  <!-- Header Text: CompTIA -->
  <text x="100" y="45" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="20" text-anchor="middle" letter-spacing="1.5">CompTIA</text>
  <line x1="45" y1="58" x2="155" y2="58" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
  <!-- Main Title: Security+ -->
  <text x="100" y="105" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="24" text-anchor="middle">Security+</text>
  <line x1="45" y1="130" x2="155" y2="130" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
  <!-- Footer Level: SY0-701 -->
  <text x="100" y="160" fill="#fef2f2" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="12" text-anchor="middle" letter-spacing="2">SY0-701 CE</text>
  <text x="100" y="182" fill="#f87171" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="10" text-anchor="middle" letter-spacing="3">CYBERSECURITY</text>
</svg>
