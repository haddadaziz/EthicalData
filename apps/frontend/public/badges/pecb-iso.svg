<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <defs>
    <linearGradient id="pecbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <filter id="shadowPecb" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Hexagon Badge Body -->
  <polygon points="100,5 190,55 190,175 100,225 10,175 10,55" fill="url(#pecbGrad)" stroke="#eab308" stroke-width="4" filter="url(#shadowPecb)" />
  <!-- Inner Border Line -->
  <polygon points="100,14 181,59 181,171 100,216 19,171 19,59" fill="none" stroke="#fef08a" stroke-width="1.5" opacity="0.6"/>
  <!-- Header Text: PECB Certified -->
  <text x="100" y="45" fill="#fef08a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="18" text-anchor="middle" letter-spacing="2">PECB</text>
  <text x="100" y="60" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="10" text-anchor="middle" letter-spacing="1.5">CERTIFIED</text>
  <line x1="45" y1="68" x2="155" y2="68" stroke="#eab308" stroke-width="1" opacity="0.5"/>
  <!-- Main Title: ISO 27001 -->
  <text x="100" y="105" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="20" text-anchor="middle">ISO/IEC 27001</text>
  <text x="100" y="128" fill="#eab308" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="13" text-anchor="middle">LEAD IMPLEMENTER</text>
  <line x1="45" y1="145" x2="155" y2="145" stroke="#eab308" stroke-width="1" opacity="0.5"/>
  <!-- Footer Level: SECURITY -->
  <text x="100" y="175" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="11" text-anchor="middle" letter-spacing="3">MANAGEMENT</text>
</svg>
