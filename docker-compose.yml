version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: coaching_platform_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password_secure_2026
      POSTGRES_DB: coaching_platform_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coaching_platform_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: coaching_platform_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@coaching.local
      PGADMIN_DEFAULT_PASSWORD: admin_password_secure_2026
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
